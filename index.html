<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acid House</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/logoFanso.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <img src="images/logoFanso.png" alt="Logo">
        </div>

        <nav class="nav">
            <a href="#">ARTISTAS</a>
            <a href="#">RELEASES</a>
            <a href="#">SHOP</a>
            <a href="/pages/login.html">LOGIN</a>
        </nav>

        <div class="icons">
            <span class="cart-icon">🛒</span> <!-- NUEVO: icono del carrito -->
            <span>👤</span>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h3>Ropa (10)</h3>
            <h3>Música (26)</h3>

            <div class="search">
                <input type="text" id="searchInput" placeholder="Buscar..."> <!-- NUEVO: id para búsqueda -->
            </div>

            <!-- NUEVO: botón para agregar producto (admin) -->
            <button class="btn-agregar" id="btnAgregarProducto">➕ Agregar Producto</button>
        </aside>

        <!-- PRODUCT GRID -->
        <main class="products" id="productsGrid">
            <!-- Las tarjetas se generarán dinámicamente desde JavaScript -->
        </main>

    </div>

    <!-- NUEVO: Modal para agregar producto -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <h3>Nuevo Producto</h3>
            <input type="text" id="prodNombre" placeholder="Nombre del producto">
            <input type="text" id="prodPrecio" placeholder="Precio (ej: 25000)">
            <input type="text" id="prodImagen" placeholder="URL de la imagen">
            <button id="guardarProducto">Guardar</button>
            <button class="cancelar" id="cancelarModal">Cancelar</button>
        </div>
    </div>

    <!-- NUEVO: Panel del carrito -->
    <div id="cartPanel" class="cart-panel">
        <span class="close-cart" id="closeCart">✖</span>
        <h3>Tu Carrito</h3>
        <div id="cartItems"></div>
        <div class="cart-total" id="cartTotal">Total: $0</div>
    </div>

    <script src="js/shop.js"></script> <!-- NUEVO: script para funcionalidades de la tienda -->
</body>
</html>
