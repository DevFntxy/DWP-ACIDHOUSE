<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acid House - Tienda</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- RUTAS CORREGIDAS -->
    <link rel="icon" href="images/logoFanso.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <div class="logo">
        <img src="images/logoFanso.png" alt="Logo">
    </div>

    <nav class="nav">
        <a href="#">ARTISTAS</a>
        <a href="#">RELEASES</a>
        <a href="#">SHOP</a>
        <a href="pages/login.html">LOGIN</a>
    </nav>

    <div class="icons">
        <span class="cart-icon">🛒</span>
        <span>👤</span>
        <span id="darkModeToggle">🌓</span>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <h3>Ropa (10)</h3>
        <h3>Música (26)</h3>

        <div class="search">
            <input type="text" id="searchInput" placeholder="Buscar...">
        </div>

        <button class="btn-agregar" id="btnAgregarProducto">➕ Agregar Producto</button>
        <button class="btn-agregar btn-info" id="toggleInfoBtn">📄 Ver más información</button>
    </aside>

    <main class="products" id="productsGrid"></main>
</div>

<!-- SCROLL REVEAL -->
<div id="infoSeccion" class="content-section hidden">
    <h2>Acerca de Acid House</h2>
    <p>Tienda independiente de música y ropa alternativa.</p>
</div>

<!-- MODAL -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <h3>Nuevo Producto</h3>
        <input type="text" id="prodNombre" placeholder="Nombre">
        <input type="text" id="prodPrecio" placeholder="Precio">
        <input type="text" id="prodImagen" placeholder="Imagen">
        <button id="guardarProducto">Guardar</button>
        <button id="cancelarModal">Cancelar</button>
    </div>
</div>

<!-- CARRITO -->
<div id="cartPanel" class="cart-panel">
    <span id="closeCart">✖</span>
    <h3>Carrito</h3>
    <div id="cartItems"></div>
    <div id="cartTotal">Total: $0</div>
</div>

<script src="js/one.js"></script>
</body>
</html>
