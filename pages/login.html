<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Acid House</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logoFanso.png">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="auth-container">

    <!-- LEFT SIDE -->
    <div class="auth-left">
        <div class="brand">
            <img src="/images/logoFanso.png" alt="Logo">
        </div>

        <div class="left-content">
            <h1>BIENVENIDO A ACID HOUSE</h1>
            <p>Inicia sesion para tener un viaje acido </p>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="auth-right">
        <div class="form-box">
            <h2>Iniciar Sesión</h2>

            <form id="loginForm" novalidate> <!-- NUEVO: id y novalidate -->
                <label>Correo electronico</label>
                <input type="email" id="loginEmail" placeholder="mail@example.com" autocomplete="off"> <!-- NUEVO: id -->

                <label>Contraseña</label>
                <!-- NUEVO: wrapper para toggle -->
                <div class="password-wrapper">
                    <input type="password" id="loginPassword" placeholder="********">
                    <span class="toggle-password" data-target="loginPassword">👁️</span>
                </div>

                <div class="options">
                    <label><input type="checkbox" id="rememberMe"> Recordarme</label> <!-- NUEVO: id -->
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit">Iniciar Sesión</button>
            </form>

            <p class="switch">
                No tienes cuenta? <a href="/pages/register.html">Crear cuenta</a>
            </p>
        </div>
    </div>

</div>

<div id="toast"></div> <!-- NUEVO: contenedor para toast -->
<script src="/js/login.js"></script> <!-- NUEVO: script específico para login -->
</body>
</html>
