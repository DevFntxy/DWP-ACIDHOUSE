<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Acid House</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/logoFanso.png">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="auth-container">
    <!-- Botón de tema oscuro propio para login -->
    <div style="position: absolute; top: 20px; right: 20px; z-index: 10;">
        <span id="themeToggle" style="cursor: pointer; font-size: 24px;">🌙</span>
    </div>

    <!-- LEFT SIDE -->
    <div class="auth-left">
        <div class="brand">
            <img src="/images/logoFanso.png" alt="Logo">
        </div>
        <div class="left-content">
            <h1>BIENVENIDO A ACID HOUSE</h1>
            <p>Inicia sesión para tener un viaje ácido</p>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="auth-right">
        <div class="form-box">
            <h2>Iniciar Sesión</h2>

            <form id="loginForm" novalidate>
                <label>Correo electrónico</label>
                <input type="email" id="loginEmail" placeholder="mail@example.com" autocomplete="off">

                <label>Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="loginPassword" placeholder="********">
                    <span class="toggle-password" data-target="loginPassword">👁️</span>
                </div>

                <div class="options">
                    <label><input type="checkbox" id="rememberMe"> Recordarme</label>
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit">Iniciar Sesión</button>
            </form>

            <p class="switch">
                ¿No tienes cuenta? <a href="/pages/register.html">Crear cuenta</a>
            </p>
        </div>
    </div>
</div>

<div id="toast"></div>
<script src="/js/one.js"></script>
</body>
</html>
